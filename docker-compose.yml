# docker-compose.yml — teamMoneyManager
# 호스트 노출 포트 49876 -> 컨테이너 내부 8080 (호스트 8080은 사용 중이라 쓰지 않음).
services:
  app:
    build: .
    ports:
      - "49876:8080"
    environment:
      - PORT=8080
      - APP_PASSWORD_HASH=${APP_PASSWORD_HASH}   # bcrypt 해시
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - data:/app/data                            # SQLite 파일 영속
    restart: unless-stopped

  # (선택) 도메인 HTTPS가 필요할 때만 활성화.
  # caddy:
  #   image: caddy:2
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #   depends_on:
  #     - app
  #   restart: unless-stopped

volumes:
  data:
