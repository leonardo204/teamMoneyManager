<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 부서비 운영 관리</title>

  <!-- Inter 폰트 (부록 A.1) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- design tokens (부록 B) -->
  <link rel="stylesheet" href="/design-tokens.css" />
</head>
<body>
  <header class="app-header">
    <span class="dot" id="conn-dot" title="서버 연결 상태"></span>
    <h1>팀 부서비 운영 관리</h1>
    <span class="sub">인당 18만 원 × 팀원 수 · 월 단위 운영 · <span id="conn-label">연결 확인 중…</span></span>
    <button class="btn" type="button" id="logout-btn" style="margin-left: auto;">로그아웃</button>
  </header>

  <div class="wrap">
    <nav class="tabs" aria-label="주요 화면">
      <button class="tab-btn active" type="button" disabled>대시보드</button>
      <button class="tab-btn" type="button" disabled>설정</button>
      <button class="tab-btn" type="button" disabled>내역</button>
    </nav>

    <section class="panel" style="margin-top: 1.1rem;">
      <h2>스캐폴딩 (T1)</h2>
      <p class="muted">
        기본 셸과 디자인 토큰이 적용된 초기 골격입니다.
        로그인 게이트(T2)가 적용되어 인증된 사용자만 이 화면을 볼 수 있습니다.
        설정, 예산 배분, 지출 입력, 대시보드, 내역 조회는
        <strong>구현 예정</strong>입니다.
      </p>
      <p class="hint">
        서버 헬스체크(<code>GET /api/health</code>) 결과가 상단 상태 점에 표시됩니다.
      </p>
    </section>
  </div>

  <footer>
    팀 부서비 운영 관리 웹앱 · 내부용 · light-console-ui
  </footer>

  <script src="/app.js"></script>
  <script>
    (function () {
      var btn = document.getElementById('logout-btn');
      if (!btn) return;
      btn.addEventListener('click', async function () {
        btn.disabled = true;
        try {
          await fetch('/api/logout', {
            method: 'POST',
            headers: { Accept: 'application/json' },
          });
        } catch (_) { /* noop */ }
        window.location.href = '/login';
      });
    })();
  </script>
</body>
</html>
