<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 부서비 운영 관리</title>

  <!-- Inter 폰트 (부록 A.1) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- design tokens (부록 B) -->
  <link rel="stylesheet" href="/design-tokens.css" />
</head>
<body>
  <header class="app-header">
    <span class="dot" id="conn-dot" title="서버 연결 상태"></span>
    <h1>팀 부서비 운영 관리</h1>
    <span class="sub">인당 18만 원 × 팀원 수 · 월 단위 운영 · <span id="conn-label">연결 확인 중…</span></span>
    <button class="btn" type="button" id="logout-btn" style="margin-left: auto;">로그아웃</button>
  </header>

  <div class="wrap">
    <nav class="tabs" aria-label="주요 화면">
      <button class="tab-btn active" type="button" disabled>대시보드</button>
      <button class="tab-btn" type="button" disabled>설정</button>
      <button class="tab-btn" type="button" disabled>내역</button>
    </nav>

    <section class="panel" style="margin-top: 1.1rem;">
      <h2>기간 선택 (T3)</h2>
      <div style="display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap;">
        <label class="section-label" for="period-select" style="margin: 0;">회계 월</label>
        <select id="period-select" style="width: auto; min-width: 160px;" aria-label="회계 월 선택">
          <option>불러오는 중…</option>
        </select>
        <span class="chip-muted chip" id="period-current-badge" hidden>당월</span>
      </div>

      <div id="period-summary" style="margin-top: 1rem;" hidden>
        <div style="display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.8rem;">
          <span class="chip chip-muted">인원 <strong id="sum-members">–</strong></span>
          <span class="chip chip-muted">인당 <strong id="sum-perperson">–</strong></span>
          <span class="chip">총예산 <strong id="sum-total">–</strong></span>
        </div>
        <table class="data" aria-label="월 카테고리 스냅샷">
          <thead>
            <tr><th>카테고리</th><th style="text-align: right;">배정액</th></tr>
          </thead>
          <tbody id="period-cat-body">
            <tr><td colspan="2" class="empty">불러오는 중…</td></tr>
          </tbody>
        </table>
      </div>

      <p class="hint" style="margin-top: 0.9rem;">
        월 최초 접근 시 그 시점의 카테고리 템플릿·인원이 스냅샷으로 시드됩니다.
        설정·팀원 편집(T4)과 대시보드 본체(T7)는 <strong>구현 예정</strong>입니다.
      </p>
    </section>
  </div>

  <footer>
    팀 부서비 운영 관리 웹앱 · 내부용 · light-console-ui
  </footer>

  <script src="/app.js"></script>
  <script>
    (function () {
      var btn = document.getElementById('logout-btn');
      if (!btn) return;
      btn.addEventListener('click', async function () {
        btn.disabled = true;
        try {
          await fetch('/api/logout', {
            method: 'POST',
            headers: { Accept: 'application/json' },
          });
        } catch (_) { /* noop */ }
        window.location.href = '/login';
      });
    })();
  </script>
</body>
</html>
